apiVersion: opentelemetry.io/v1alpha1
kind: OpenTelemetryCollector
metadata:
  name: simplest
spec:
  config: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:

    #exporters:
      # NOTE: Prior to v0.86.0 use `logging` instead of `debug`.
    #  debug:
    exporters:
      logging:
        loglevel: info
      otlp:
        #endpoint: "tempo-operator-controller-manager-metrics-service.tempo-operator-system:8443"
        endpoint: "https://tempo-operator-controller-manager-metrics-service.tempo-operator-system:8443/api/v1/trace"
        tls:
          insecure: true
    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: []
          exporters: [otlp]