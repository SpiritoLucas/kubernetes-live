---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: observability-appset
  namespace: argocd
spec:
  syncPolicy:
    preserveResourcesOnDeletion: true
  generators:
  - git:
      repoURL: https://github.com/SpiritoLucas/kubernetes-live.git
      revision: HEAD
      directories:
      - path: 'loki-distributed/overlays/loki'
      #- path: 'promtail/overlays/promtail'
      #- path: 'grafana-tempo/overlays/tempo'
      #- path: 'exporters/overlays/exporters'
      #- path: 'victoria-metrics/overlays/observability'
  template:
    metadata:
      name: '{{ path[0] }}'
    spec:
      project: observability
      source:
        repoURL: https://github.com/SpiritoLucas/kubernetes-live.git
        targetRevision: HEAD
        path: '{{ path }}'
      destination:
        server: https://kubernetes.default.svc
        namespace: observability
      syncPolicy:  
        automated:
          prune: true
          selfHeal: true
          allowEmpty: true
        syncOptions:
        - CreateNamespace=true
        - PruneLast=true
        - ServerSideApply=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
