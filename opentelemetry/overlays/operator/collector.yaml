apiVersion: opentelemetry.io/v1alpha1
kind: OpenTelemetryCollector
metadata:
  name: simplest
spec:
  config: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
            cors:
              allowed_origins:
                - "https://broidery.k3s"
                - "https://broidery-bg.k3s"
              #allowed_headers:
              #  - "*"
              max_age: 7200
      prometheus:
        config:
          scrape_configs:
            - job_name: otel-collector
              scrape_interval: 5s
              static_configs:
                - targets: [localhost:8888]
    processors:
      batch:

    #exporters:
      # NOTE: Prior to v0.86.0 use `logging` instead of `debug`.
    #  debug:
    exporters:
      logging:
        loglevel: info
      otlp:
        endpoint: "http://tempo-distributor.observability:4317" 
        tls:
          insecure: true
    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [logging, otlp]
        metrics:
          receivers: [otlp]
          processors: [batch]
          exporters: [otlp]
        logs:
          receivers: [otlp]
          processors: [batch]
          exporters: [logging, otlp]