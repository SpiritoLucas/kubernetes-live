apiVersion: tempo.grafana.com/v1alpha1
kind: TempoMonolithic
metadata:
  name: sample
spec:
  storage:
    traces:
      backend: memory
  resources:
    limits:
      cpu: 500m
      memory: 500Mi
  jaegerui:
    enabled: true
    ingress:
      enabled: false
    resources:
      limits:
        cpu: 500m
        memory: 500Mi