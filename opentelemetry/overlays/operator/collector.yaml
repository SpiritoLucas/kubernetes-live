apiVersion: opentelemetry.io/v1alpha1
kind: OpenTelemetryCollector
metadata:
  name: simplest
spec:
  config: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:

    #exporters:
      # NOTE: Prior to v0.86.0 use `logging` instead of `debug`.
    #  debug:
    exporters:
      otlp:
        endpoint: "https://tempo-operator-webhook-service.tempo-operator-system.svc/api/v2/spans"
    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: []
          exporters: [otlp]