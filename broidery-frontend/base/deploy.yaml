apiVersion: apps/v1
kind: Deployment
metadata:
  name: broidery-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: broidery-frontend
  template:
    metadata:
      labels:
        app: broidery-frontend
    spec:
      containers:
      - image: spirito/broidery-fe:latest
        name: broidery-frontend
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        livenessProbe:
          failureThreshold: 4
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 2
        readinessProbe:
          failureThreshold: 4
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 20
          timeoutSeconds: 2
        resources:
          limits:
            cpu: 500m
            memory: 500Mi
          requests:
            cpu: 200m
            memory: 200Mi

