---
# Source: victoria-metrics-k8s-stack/templates/victoria-metrics-operator/alertmanager/vmalertmanager.yaml
apiVersion: v1
kind: Secret
metadata:
  name: victoria-metrics-stack-victoria-metrics-k8s-stack-alertmanager
  namespace: observability
  labels:
    app.kubernetes.io/component: victoria-metrics-k8s-stack-alertmanager
    helm.sh/chart: victoria-metrics-k8s-stack-0.18.11
    app.kubernetes.io/name: victoria-metrics-k8s-stack
    app.kubernetes.io/instance: victoria-metrics-stack
    app.kubernetes.io/version: "v1.96.0"
    app.kubernetes.io/managed-by: Helm
stringData:
  alertmanager.yaml: "global:\n  resolve_timeout: 5m\n  slack_api_url: http://slack:30500/\ninhibit_rules:\n- equal:\n  - cluster\n  - namespace\n  - alertname\n  source_matchers:\n  - severity=critical\n  target_matchers:\n  - severity=~\"warning|info\"\n- equal:\n  - cluster\n  - namespace\n  - alertname\n  source_matchers:\n  - severity=warning\n  target_matchers:\n  - severity=info\n- equal:\n  - cluster\n  - namespace\n  source_matchers:\n  - alertname=InfoInhibitor\n  target_matchers:\n  - severity=info\nreceivers:\n- name: slack-monitoring\n  slack_configs:\n  - actions:\n    - text: 'Runbook :green_book:'\n      type: button\n      url: '{{ (index .Alerts 0).Annotations.runbook_url }}'\n    - text: 'Query :mag:'\n      type: button\n      url: '{{ (index .Alerts 0).GeneratorURL }}'\n    - text: 'Dashboard :grafana:'\n      type: button\n      url: '{{ (index .Alerts 0).Annotations.dashboard }}'\n    - text: 'Silence :no_bell:'\n      type: button\n      url: '{{ template \"__alert_silence_link\" . }}'\n    - text: '{{ template \"slack.monzo.link_button_text\" . }}'\n      type: button\n      url: '{{ .CommonAnnotations.link_url }}'\n    channel: '#channel'\n    color: '{{ template \"slack.monzo.color\" . }}'\n    icon_emoji: '{{ template \"slack.monzo.icon_emoji\" . }}'\n    send_resolved: true\n    text: '{{ template \"slack.monzo.text\" . }}'\n    title: '{{ template \"slack.monzo.title\" . }}'\n- name: slack-code-owners\n  slack_configs:\n  - actions:\n    - text: 'Runbook :green_book:'\n      type: button\n      url: '{{ (index .Alerts 0).Annotations.runbook }}'\n    - text: 'Query :mag:'\n      type: button\n      url: '{{ (index .Alerts 0).GeneratorURL }}'\n    - text: 'Dashboard :grafana:'\n      type: button\n      url: '{{ (index .Alerts 0).Annotations.dashboard }}'\n    - text: 'Silence :no_bell:'\n      type: button\n      url: '{{ template \"__alert_silence_link\" . }}'\n    - text: '{{ template \"slack.monzo.link_button_text\" . }}'\n      type: button\n      url: '{{ .CommonAnnotations.link_url }}'\n    channel: '#{{ .CommonLabels.code_owner_channel }}'\n    color: '{{ template \"slack.monzo.color\" . }}'\n    icon_emoji: '{{ template \"slack.monzo.icon_emoji\" . }}'\n    send_resolved: true\n    text: '{{ template \"slack.monzo.text\" . }}'\n    title: '{{ template \"slack.monzo.title\" . }}'\nroute:\n  group_by:\n  - alertgroup\n  - job\n  group_interval: 5m\n  group_wait: 30s\n  receiver: slack-monitoring\n  repeat_interval: 12h\n  routes:\n  - group_by:\n    - code_owner_channel\n    - alertgroup\n    - job\n    matchers:\n    - code_owner_channel!=\"\"\n    - severity=~\"info|warning|critical\"\n    receiver: slack-code-owners\n  - continue: true\n    matchers:\n    - severity=~\"info|warning|critical\"\n    receiver: slack-monitoring\ntemplates:\n- /etc/vm/configs/**/*.tmpl"
