apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
spec:
  project: logs
  source:
    repoURL: https://github.com/SpiritoLucas/loki.git
    path: .  
  destination:
    server: https://kubernetes.default.svc
    namespace: logs
  syncPolicy:
    automated: {}
    syncOptions:
      - PruneLast=false
      - ServerSideApply=true
