apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tempo
  namespace: argocd
spec:
  project: observability
  source:
    repoURL: git@gitlab.com:fravega-it/infrastructure/kubernetes/applications-repository/grafana-tempo.git
    path: .  
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated: {}
    syncOptions:
      - PruneLast=false
      - ServerSideApply=true
