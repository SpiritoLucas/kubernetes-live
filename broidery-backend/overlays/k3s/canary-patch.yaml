- op: replace
  path: /kind
  value: Rollout
- op: replace
  path: /apiVersion
  value: argoproj.io/v1alpha1
- op: add
  path: /spec/strategy
  value: {}
- op: add
  path: /spec/strategy/canary
  value: {}
- op: add
  path: /spec/strategy/canary/stableMetadata
  value: 
    labels:
        role: stable
        tags.datadoghq.com/env: development
        tags.datadoghq.com/service: broidery-backend
        tags.datadoghq.com/version: '${APP_VERSION}'
- op: add
  path: /spec/strategy/canary/canaryMetadata
  value: 
    labels:
        role: canary
        tags.datadoghq.com/version: 
          valueFrom:
            fieldPath: 'spec.template.spec.containers[0].image'
- op: add
  path: /spec/strategy/canary/steps
  value:
    - setWeight: 30
    - pause: {}
    - setWeight: 60
    - pause:
        duration: 3m
    - setWeight: 100
    - pause:
        duration: 10s


